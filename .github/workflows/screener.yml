name: Run Screener
on:
  schedule:
    # 1. 9:30 AM - 10:55 AM IST (4:00 AM - 5:25 AM UTC) every 5 mins, Mon-Fri
    - cron: '0-55/5 4 * * 1-5'
    - cron: '0-25/5 5 * * 1-5'

    # 2. 11:00 AM IST (5:30 AM UTC) sharp execution, Mon-Fri
    - cron: '30 5 * * 1-5'

    # 3. 2:00 PM - 3:00 PM IST (8:30 AM - 9:30 AM UTC) every 5 mins, Mon-Fri
    - cron: '30-55/5 8 * * 1-5'
    - cron: '0-30/5 9 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas scikit-learn yfinance
          python -m pip install pandas-ta --no-cache-dir
      - name: Run Screener
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python main.py
      - name: Commit and Push New Signals
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "Update signals" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
