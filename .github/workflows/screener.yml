name: Run Screener
on:
  schedule:
    - cron: '*/5 4-6 * * 1-5'
    - cron: '*/5 8-9 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas scikit-learn yfinance
          python -m pip install pandas-ta --no-cache-dir
      - name: Run Screener
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python main.py
      - name: Commit and Push Dashboard
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "Update signals" || echo "No changes to commit"
          git push
