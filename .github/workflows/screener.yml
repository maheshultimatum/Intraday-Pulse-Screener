name: Run Screener
on:
  schedule:
    # Run every 5 minutes from 03:45 UTC (09:15 IST) to 10:00 UTC (15:30 IST)
    # The cron string below covers the window: 9:15 AM to 3:30 PM IST, Mon-Fri
    - cron: '45-59 3 * * 1-5'
    - cron: '*/5 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas scikit-learn yfinance
          python -m pip install pandas-ta --no-cache-dir
      - name: Run Screener
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python main.py
      - name: Commit and Push New Signals
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "Update signals" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
